name: Extract Site Content
on:
  push:
    paths:
      - '_site_archive.b64'
      - '_archive_*.b64'
permissions:
  contents: write
jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract site content
        run: |
          if [ -f _site_archive.b64 ]; then
            base64 -d _site_archive.b64 > site.tar.gz
            tar xzf site.tar.gz --overwrite
            rm -f _site_archive.b64 site.tar.gz
          fi
          # Handle split archives
          if ls _archive_*.b64 1>/dev/null 2>&1; then
            cat _archive_*.b64 | base64 -d > site.tar.xz
            tar xJf site.tar.xz --overwrite
            rm -f _archive_*.b64 site.tar.xz
          fi
      - name: Commit extracted files
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Deploy all site content" || echo "No changes"
          git push
