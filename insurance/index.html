  <script type="application/ld+json">

    "mainEntity": [
      {"@type": "Question", "name": "What types of insurance do I need?", "acceptedAnswer": {"@type": "Answer", "text": "Most adults need at minimum auto insurance (if they own a vehicle), health insurance, and renters or homeowners insurance. If you have dependents, life insurance is essential. Business owners need commercial coverage. The right mix depends on your age, assets, family size, and risk tolerance."}},
      {"@type": "Question", "name": "What is a deductible in insurance?", "acceptedAnswer": {"@type": "Answer", "text": "A deductible is the amount you pay out-of-pocket before your insurance coverage kicks in. For example, if you have a $1,000 deductible on your auto policy and have a $5,000 claim, you pay the first $1,000 and your insurer covers the remaining $4,000. Generally, higher deductibles mean lower monthly premiums."}},
      {"@type": "Question", "name": "How much does car insurance cost on average?", "acceptedAnswer": {"@type": "Answer", "text": "The national average for full-coverage auto insurance in 2026 is approximately $2,008 per year or about $167 per month. However, rates vary significantly by state, driving record, age, vehicle type, and coverage level. Minimum-coverage policies average around $680 per year."}},
      {"@type": "Question", "name": "What is the difference between term and whole life insurance?", "acceptedAnswer": {"@type": "Answer", "text": "Term life insurance provides coverage for a specific period (10, 20, or 30 years) and is significantly cheaper. Whole life insurance provides lifelong coverage with a cash value component that grows over time but costs 5 to 15 times more than term. Most financial experts recommend term life for the majority of people."}},
      {"@type": "Question", "name": "What is the difference between HMO and PPO health plans?", "acceptedAnswer": {"@type": "Answer", "text": "An HMO (Health Maintenance Organization) requires you to choose a primary care physician and get referrals for specialists, but typically has lower premiums and copays. A PPO (Preferred Provider Organization) allows you to see any doctor without a referral and offers out-of-network coverage, but at higher premiums. PPOs offer more flexibility while HMOs offer lower costs."}},
      {"@type": "Question", "name": "Does renters insurance cover theft?", "acceptedAnswer": {"@type": "Answer", "text": "Yes, renters insurance typically covers theft of your personal belongings, both inside your rental unit and often outside it (such as items stolen from your car). Standard renters policies also cover damage from fire, smoke, vandalism, and certain water damage. Average renters insurance costs just $15 to $30 per month."}},
      {"@type": "Question", "name": "What does umbrella insurance cover?", "acceptedAnswer": {"@type": "Answer", "text": "Umbrella insurance provides additional liability coverage beyond the limits of your auto, home, or renters policy. It protects you if you are sued for damages that exceed your other policy limits. For example, if you cause a car accident with $500,000 in damages but your auto policy only covers $300,000, a $1 million umbrella policy would cover the remaining $200,000. Typical costs range from $150 to $300 per year for $1 million in coverage."}},
      {"@type": "Question", "name": "Is pet insurance worth it?", "acceptedAnswer": {"@type": "Answer", "text": "Pet insurance can be worth it if your pet develops a serious illness or has an accident requiring expensive treatment. Emergency veterinary care can easily cost $3,000 to $10,000 or more. Pet insurance typically costs $30 to $60 per month for dogs and $15 to $30 for cats. It is most valuable when purchased while your pet is young and healthy, as pre-existing conditions are not covered."}},
      {"@type": "Question", "name": "What is coinsurance in health insurance?", "acceptedAnswer": {"@type": "Answer", "text": "Coinsurance is the percentage of medical costs you pay after meeting your deductible. For example, with 20% coinsurance, you pay 20% of covered medical bills and your insurance pays the remaining 80%. This continues until you reach your out-of-pocket maximum, after which insurance covers 100% of covered services for the rest of the plan year."}},
      {"@type": "Question", "name": "Do I need flood insurance?", "acceptedAnswer": {"@type": "Answer", "text": "Standard homeowners insurance does not cover flood damage. If you live in a FEMA-designated flood zone, your mortgage lender will require separate flood insurance. Even if you are not in a high-risk zone, approximately 25% of flood claims come from low-to-moderate risk areas. Flood insurance through the NFIP typically costs $700 to $1,500 per year depending on your risk level and coverage amount."}},
      {"@type": "Question", "name": "How much life insurance do I need?", "acceptedAnswer": {"@type": "Answer", "text": "A common rule of thumb is 10 to 15 times your annual income, but the right amount depends on your debts, number of dependents, future education costs, and your spouse's earning capacity. A more precise method is to add up your debts, future income replacement needs (multiply annual income by years until your youngest child is self-sufficient), education costs, and funeral expenses, then subtract existing assets."}},
      {"@type": "Question", "name": "What is the difference between replacement cost and actual cash value?", "acceptedAnswer": {"@type": "Answer", "text": "Replacement cost coverage pays to replace damaged property with new items of similar kind and quality, regardless of depreciation. Actual cash value (ACV) pays the replacement cost minus depreciation, meaning you receive less for older items. For example, if a 5-year-old roof is damaged, replacement cost covers a new roof while ACV accounts for 5 years of wear. Replacement cost coverage is recommended as it provides significantly better protection."}},
      {"@type": "Question", "name": "What does business insurance typically cost?", "acceptedAnswer": {"@type": "Answer", "text": "Business insurance costs vary widely depending on the type and size of business. General liability insurance averages $400 to $800 per year for small businesses. A Business Owner's Policy (BOP), which bundles general liability with commercial property insurance, typically costs $500 to $3,000 annually. Professional liability (errors and omissions) ranges from $500 to $2,500 per year depending on the industry."}},
      {"@type": "Question", "name": "When should I buy travel insurance?", "acceptedAnswer": {"@type": "Answer", "text": "Purchase travel insurance as soon as you book your trip to maximize coverage, especially for trip cancellation benefits. Travel insurance is most worthwhile for expensive international trips, travel to remote destinations, trips with elderly travelers, and cruises. A comprehensive travel insurance policy typically costs 4% to 10% of your total trip cost. It is generally not necessary for inexpensive domestic trips or when you already have strong travel credit card protections."}},
      {"@type": "Question", "name": "What is a rider in insurance?", "acceptedAnswer": {"@type": "Answer", "text": "A rider is an optional add-on to an insurance policy that provides additional coverage or modifies the standard terms. Common examples include a scheduled personal property rider on homeowners insurance to cover expensive jewelry, a waiver of premium rider on life insurance that waives premiums if you become disabled, or an accidental death rider that doubles the death benefit if the insured dies in an accident. Riders typically cost extra but allow you to customize your policy."}}
    ]
