<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — SmartPath Guides</title>
    <meta name="robots" content="noindex">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #FAFAF8;
            --surface: #FFFFFF;
            --text: #1A1A1A;
            --text-secondary: #555555;
            --accent: #2563EB;
            --accent-hover: #1D4ED8;
            --border: rgba(0,0,0,0.08);
            --radius: 12px;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 0 24px; }
        .error-page { min-height: 60vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 80px 0; }
        .error-code { font-family: 'Fraunces', Georgia, serif; font-size: clamp(80px, 15vw, 140px); font-weight: 700; color: var(--accent); line-height: 1; margin-bottom: 24px; }
        .error-title { font-size: 28px; font-weight: 600; margin-bottom: 16px; }
        .error-text { font-size: 17px; color: var(--text-secondary); margin-bottom: 40px; max-width: 400px; margin-left: auto; margin-right: auto; }
        .btn { display: inline-flex; align-items: center; gap: 8px; padding: 14px 28px; background: var(--accent); color: white; text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 16px; transition: background 0.2s; }
        .btn:hover { background: var(--accent-hover); }
        footer { background: var(--surface); border-top: 1px solid var(--border); padding: 40px 0; margin-top: 60px; text-align: center; color: var(--text-secondary); font-size: 14px; }
        footer a { color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-page">
            <div>
                <div class="error-code">404</div>
                <h1 class="error-title">Page Not Found</h1>
                <p class="error-text">The page you're looking for doesn't exist or has been moved.</p>
                <a href="/" class="btn">← Back to Home</a>
            </div>
        </div>
    </div>
    <footer>

        </div>
    </footer>
</body>
</html>
