    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #FAFAF8;
            --surface: #FFFFFF;
            --text: #1A1A1A;
            --text-secondary: #555555;
            --accent: #2563EB;
            --accent-hover: #1D4ED8;
            --border: rgba(0,0,0,0.08);
            --radius: 12px;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 20px 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }
        .logo {
            font-family: 'Fraunces', serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
        }
        .logo span { color: var(--accent); }
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 60px 24px;
        }
        .error-content h1 {
            font-family: 'Fraunces', serif;
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text);
        }
        .error-content p {
            font-size: 1.125rem;
            color: var(--text-secondary);
            margin-bottom: 32px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }
        .btn {
            display: inline-block;
            background: var(--accent);
            color: #fff;
            padding: 14px 32px;
            border-radius: var(--radius);
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: background 0.18s ease;
        }
        .btn:hover { background: var(--accent-hover); }
        footer {
            text-align: center;
            padding: 24px;
            color: var(--text-secondary);
            font-size: 0.875rem;
            border-top: 1px solid var(--border);
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <a href="/" class="logo">Smart<span>Path</span> Guides</a>
        </div>
    </header>
    <main>
        <div class="error-content">
            <h1>Page Not Found</h1>
            <p>The page you're looking for doesn't exist or has been moved. Head back to explore our expert guides.</p>
            <a href="/" class="btn">Back to Home</a>
        </div>
    </main>
    <footer>
        <p>&copy; 2026 SmartPath Guides. All rights reserved.</p>
    </footer>
</body>
